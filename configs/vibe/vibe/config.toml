active_model = "devstral-local"
default_agent = "accept-edits"
enable_telemetry = false
enable_update_checks = true
applied_migrations = [
    "bash_read_only_defaults_v1",
]
ask_confirmation_on_exit = false
theme = "textual-dark"

[tools.read_file]
permission = "always"
max_read_bytes = 16000

[tools.grep]
permission = "always"
max_output_bytes = 16000

[tools.write_file]
permission = "always"
allowlist = [
    "/tmp/*",
]

[tools.edit]
permission = "always"

[tools.bash]
permission = "ask"
allowlist = [
    "./klondike",
    "./sudoku",
    "/home/wecker/git/languages/go/sudoku/test_format.sh",
    "cargo build",
    "cargo check",
    "cargo test",
    "cat",
    "cd",
    "chmod",
    "echo",
    "find",
    "find . -name \"*.go\" -exec grep -l \"type GameState\" {} \\;",
    "find . -name \"*.go\" -exec grep -l \"type MovePreview struct\" {} \\;",
    "git diff",
    "git log",
    "git show",
    "git status",
    "go build",
    "go build ./...",
    "go run",
    "go test",
    "go test ./...",
    "go vet ./...",
    "gofmt",
    "grep",
    "head",
    "ls",
    "mkdir",
    "mv",
    "rm",
    "sed",
    "tail",
    "timeout",
    "wc",
    "xargs",
]
denylist = [
    "rm -rf",
    "git reset --hard",
    "git clean -fd",
    "git push --force",
]

[[providers]]
name = "devstral-local"
api_base = "http://127.0.0.1:18024/v1"
api_key_env_var = "VIBE_LOCAL_API_KEY"
api_style = "openai"
backend = "generic"

[[models]]
name = "devstral-small-2-24b"
provider = "devstral-local"
alias = "devstral-local"
temperature = 0.15
input_price = 0.0
output_price = 0.0
thinking = "max"
auto_compact_threshold = 40000
