active_model = "devstral-local"
default_agent = "accept-edits"
enable_telemetry = false
enable_update_checks = true
applied_migrations = [
    "bash_read_only_defaults_v1",
]

[tools.read_file]
permission = "always"
max_read_bytes = 16000

[tools.grep]
permission = "always"
max_output_bytes = 16000

[tools.write_file]
permission = "always"
allowlist = [
    "/tmp/*",
]

[tools.edit]
permission = "always"

[tools.bash]
permission = "ask"
allowlist = [
    "./sudoku",
    "cargo build",
    "cargo check",
    "cargo test",
    "cd",
    "find",
    "git diff",
    "git status",
    "go build ./...",
    "go run",
    "go test",
    "go test ./...",
    "go vet ./...",
    "gofmt",
    "grep",
    "head",
    "ls",
    "mkdir",
    "sed",
    "wc",
]
denylist = [
    "rm -rf",
    "git reset --hard",
    "git clean -fd",
    "git push --force",
]

[[providers]]
name = "devstral-local"
api_base = "http://127.0.0.1:18024/v1"
api_key_env_var = "VIBE_LOCAL_API_KEY"
api_style = "openai"
backend = "generic"

[[models]]
name = "devstral-small-2-24b"
provider = "devstral-local"
alias = "devstral-local"
temperature = 0.15
input_price = 0.0
output_price = 0.0
thinking = "off"
auto_compact_threshold = 56000
