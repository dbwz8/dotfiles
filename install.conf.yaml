- defaults:
    link:
      create: true
      relink: true

- link:
    ~/.bash_profile: configs/bash/bash_profile
    ~/.bashrc: configs/bash/bashrc
    ~/.condarc: configs/conda/condarc
    ~/.claude/settings.json: configs/claude/claude/settings.json
    ~/.claude/statusline.py: configs/claude/claude/statusline.py
    ~/.claude/hooks/block-git-rewrites.py: configs/claude/claude/hooks/block-git-rewrites.py
    ~/.claude/setup-claude-vertex-auth.sh: configs/claude/claude/setup-claude-vertex-auth.sh
    ~/.codex/config.toml: configs/codex/codex/config.toml
    ~/.codex/AGENTS.md: configs/codex/codex/AGENTS.md
    ~/.codex/skills/weekly-update: configs/codex/codex/skills/weekly-update
    ~/.aider.conf.yml: configs/aider/aider.conf.yml
    ~/.aider.model.metadata.json: configs/aider/aider.model.metadata.json
    ~/.aider.model.settings.yml: configs/aider/aider.model.settings.yml
    ~/.aider/CONVENTIONS.md: configs/aider/CONVENTIONS.md
    ~/.qwen/settings.json: configs/qwen/qwen/settings.json
    ~/.qwen/QWEN.md: configs/qwen/qwen/QWEN.md
    ~/.config/atuin: configs/atuin
    ~/.Brewfile:
      if: '[ `uname` = Darwin ]'
      path: configs/macos/Brewfile
    ~/.config/Code/User/keybindings.json:
      if: '[ `uname` = Linux ]'
      path: configs/vscode/Code/User/keybindings.json
    ~/.config/Code/User/settings.json:
      if: '[ `uname` = Linux ]'
      path: configs/vscode/Code/User/settings.json
    ~/.local/share/applications/ulm.desktop:
      if: '[ `uname` = Linux ]'
      path: configs/applications/ulm.desktop
    ~/.local/share/icons/hicolor/256x256/apps/ulm.png:
      if: '[ `uname` = Linux ]'
      path: configs/icons/ulm.png
    ~/.config/dask/distributed.yaml: configs/dask/distributed.yaml
    ~/.config/git/attributes: configs/git/attributes
    ~/.config/ghostty/config.ghostty: configs/ghostty/config.ghostty
    ~/.config/nvim:
      path: configs/nvim
      force: true
    ~/.config/starship.toml: configs/starship/starship.toml
    ~/.config/zellij: configs/zellij
    ~/.direnvrc: configs/direnv/direnvrc
    ~/.dotbins/dotbins.yaml: configs/dotbins/dotbins.yaml
    ~/.gitconfig-personal: configs/git/gitconfig-personal
    ~/.gitconfig: configs/git/gitconfig
    ~/Library/Application Support/Code/User/keybindings.json:
      if: '[ `uname` = Darwin ]'
      path: configs/vscode/Code/User/keybindings.json
    ~/Library/Application Support/Code/User/settings.json:
      if: '[ `uname` = Darwin ]'
      path: configs/vscode/Code/User/settings.json
    ~/.local/bin/nbviewer: scripts/nbviewer.sh
    ~/.local/bin/run: scripts/run.sh
    ~/.local/bin/install-codex: scripts/install-codex.sh
    ~/.local/bin/install-claude: scripts/install-claude.sh
    ~/.local/bin/install-go: scripts/install-go.sh
    ~/.local/bin/install-qwen-code: scripts/install-qwen-code.sh
    ~/.local/bin/install-macos-packages: scripts/install-macos-packages.sh
    ~/.local/bin/qwen: scripts/qwen.sh
    ~/.local/bin/sync-dotfiles: scripts/sync-dotfiles.sh
    ~/.local/bin/sync-local-dotfiles: scripts/sync-local-dotfiles.sh
    ~/.local/bin/sync-uv-tools: scripts/sync-uv-tools.sh
    ~/.local/bin/ulm: scripts/ulm.sh
    ~/.local/bin/upload-file: scripts/upload-file.sh
    ~/.mambarc: configs/mamba/mambarc
    ~/.oh-my-zsh: submodules/oh-my-zsh
    ~/.config/dotfiles-shell: configs/shell
    ~/.zshenv: configs/zsh/zshenv
    ~/.zshrc: configs/zsh/zshrc
  
